server:
  port: 8080

spring:
  application:
    name: careerpilot-backend
  datasource:
    url: jdbc:h2:file:./data/careerpilot;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 500ms
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

ai:
  api-key: ${AI_API_KEY:}
  base-url: ${AI_BASE_URL:https://api.okinto.com/v1}
  model: ${AI_MODEL:gpt-5.2}
  timeout-seconds: 60

app:
  auth:
    jwt-secret: ${JWT_SECRET:careerpilot-dev-secret-change-me}
    token-expire-hours: 72
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
